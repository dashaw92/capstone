syntax = "proto3";
package pantry_protocol;

import "google/protobuf/empty.proto";

// Entity in the Ingredients table
// id: autogenerated ID used to reference a row in other tables
// label: human-readable name of this ingredient
message Ingredient {
  int32 id = 1;
  string label = 2;
}

// Create new Ingredients.
// Each label must be unique.
message CreateIngredientsRequest {
  repeated string label = 1;
}

// The list of inserted ingredients from CreateIngredientsRequest
message CreatedIngredientsResponse {
  repeated Ingredient ingredients = 1;
}

// Drop an Ingredient from the database
message DeleteIngredientRequest {
  int32 id = 1;
}

// Get all Ingredients in the database
message ListIngredientsResponse {
  repeated Ingredient ingredients = 1;
}

// Represents a single native library the server has loaded.
// baseDomain is the host portion of a recipe website, i.e. "allrecipes.com".
message Extractor {
  string baseDomain = 1;
}

// Get the list of extractors the server has loaded.
message ListExtractorsResponse {
  repeated Extractor extractors = 1;
}

// Request the server perform an ingredient extraction against the provided recipe URL.
message ExecuteExtractorRequest {
  string url = 1;
}

// The ingredients the extractor returned from a recipe URL. If this failed,
// the ingredients will be null or empty.
message ExtractorExecutionResponse {
  repeated string ingredients = 1;
}

// Used by the client to check if an address is a valid pantry inventory backend server.
// response can be literally anything, I just hardcoded it to be "ok" in backend.
message Pong {
  string response = 1;
}

// The functions implemented by the gRPC server stub that are likewise available on the gRPC client
// stub.
service PantryService {
  // (Optionally) bulk ingredient creation request -> list of created Ingredients
  rpc CreateIngredients(CreateIngredientsRequest) returns (CreatedIngredientsResponse);
  // All ingredients in the database
  rpc ListIngredients(google.protobuf.Empty) returns (ListIngredientsResponse);
  // Drop a specific ingredient
  rpc DeleteIngredient(DeleteIngredientRequest) returns (google.protobuf.Empty);

  // List all loaded extractors (provides the supported URLs).
  rpc ListExtractors(google.protobuf.Empty) returns (ListExtractorsResponse);
  // Request extraction against a given URL. The client has no reason to request a specific
  // extractor because only one extractor will exist for a recipe website.
  rpc ExecuteExtractor(ExecuteExtractorRequest) returns (ExtractorExecutionResponse);

  // Client determining if the provided address is valid.
  rpc Ping(google.protobuf.Empty) returns (Pong);
}
