syntax = "proto3";
package pantry_protocol;

import "google/protobuf/empty.proto";

// Entity in the UPCs table
// upc: Barcode of the item
// nameId: Associated entity in the name's table (FK of names_table)
message Upc {
  string upc = 1;
  int32 nameId = 2;
}

// Entity in the Names table
// id: autogenerated ID used to reference a row in other tables
// label: human-readable name of this ingredient (lowercased)
message Name {
  int32 id = 1;
  string label = 2;
}

// nameId: FK on Name
// amount: current amount of the ingredient. Always at least 0
message Item {
  int32 nameId = 1;
  double amount = 2;
}

// Store a new UPC in the UPCs table associated to the provided name by ID
message CreateUpcResponse {
  Upc upc = 1;
}

// Try to get a Name by its label
message GetIdRequest {
  string label = 1;
}

// Get all associated UPCs for the Name
message GetUpcsRequest {
  int32 nameId = 1;
}

// Yield UPCs for either targetted queries against a specific Name or all known UPCs
message ListUpcsResponse {
  repeated Upc upcs = 1;
}

// Drop a UPC from the table
message DeleteUpcRequest {
  string upc = 1;
}

// Drop all of a Name's associated UPCs from the table
message DeleteUpcsRequest {
  int32 nameId = 1;
}

// Try to create a new Name
message CreateNameRequest {
  string label = 1;
}

// Drop a Name from the table and delete all associated UPCs
message DeleteNameRequest {
  int32 nameId = 1;
}

// Get all Names in the table
message ListNamesResponse {
  repeated Name names = 1;
}

// Get the stored amount for a Name
message GetAmountRequest {
  int32 nameId = 1;
}

// Add the amount to the stored amount for a Name.
// amount can be negative (considered removing from the stored amount).
message AddAmountRequest {
  int32 nameId = 1;
  double amount = 2;
}

// Directly set the new amount for a Name
message SetAmountRequest {
  int32 nameId = 1;
  double amount = 2;
}

// Set the amount for a Name to 0
message ResetAmountRequest {
  int32 nameId = 1;
}

message Pong {
  string response = 1;
}

service PantryService {
  rpc CreateUpc(Upc) returns (CreateUpcResponse);
  rpc ListUpcs(GetUpcsRequest) returns (ListUpcsResponse);
  rpc ListAllUpcs(google.protobuf.Empty) returns (ListUpcsResponse);
  rpc DeleteUpc(DeleteUpcRequest) returns (google.protobuf.Empty);

  rpc CreateName(CreateNameRequest) returns (Name);
  rpc DeleteName(DeleteNameRequest) returns (google.protobuf.Empty);
  rpc ListNames(google.protobuf.Empty) returns (ListNamesResponse);

  rpc GetAmount(GetAmountRequest) returns (Item);
  rpc UpdateAmount(AddAmountRequest) returns (Item);
  rpc SetAmount(SetAmountRequest) returns (Item);
  rpc ResetAmount(ResetAmountRequest) returns (Item);

  rpc Ping(google.protobuf.Empty) returns (Pong);
}
