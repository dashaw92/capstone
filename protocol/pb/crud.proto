syntax = "proto3";
package pantry_protocol;

import "google/protobuf/empty.proto";

// Entity in the Ingredients table
// id: autogenerated ID used to reference a row in other tables
// label: human-readable name of this ingredient
// amount: amount in grams of the ingredient. always at least 0
message Ingredient {
  int32 id = 1;
  string label = 2;
  double amount = 3;
}

// Try to get an Ingredient by its label
message GetIdRequest {
  string label = 1;
}

// Try to create a new Ingredient
message CreateIngredientRequest {
  string label = 1;
  optional double amount = 2;
}

// Drop an Ingredient from the database
message DeleteIngredientRequest {
  int32 id = 1;
}

// Get all Ingredients in the database
message ListIngredientsResponse {
  repeated Ingredient ingredients = 1;
}

// Directly set the new amount for a Ingredient
message UpdateIngredientRequest {
  int32 id = 1;
  double amount = 2;
}

message RenameIngredientRequest {
  int32 id = 1;
  string newLabel = 2;
}

message Extractor {
  string baseDomain = 1;
}

message ListExtractorsResponse {
  repeated Extractor extractors = 1;
}

message ExecuteExtractorRequest {
  string url = 1;
}

message ExtractorExecutionResponse {
  repeated string ingredients = 1;
}

message Pong {
  string response = 1;
}

service PantryService {
  rpc CreateIngredient(CreateIngredientRequest) returns (Ingredient);
  rpc ListIngredients(google.protobuf.Empty) returns (ListIngredientsResponse);
  rpc UpdateIngredient(UpdateIngredientRequest) returns (Ingredient);
  rpc RenameIngredient(RenameIngredientRequest) returns (Ingredient);
  rpc DeleteIngredient(DeleteIngredientRequest) returns (google.protobuf.Empty);

  rpc ListExtractors(google.protobuf.Empty) returns (ListExtractorsResponse);
  rpc ExecuteExtractor(ExecuteExtractorRequest) returns (ExtractorExecutionResponse);

  rpc Ping(google.protobuf.Empty) returns (Pong);
}
